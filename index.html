<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>星月魔法学院</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-label="星月魔法学院">
      <section class="topbar">
        <div>
          <p class="kicker">Moonlit Academy</p>
          <h1>星月魔法学院</h1>
          <p class="subtitle">从一名普通学徒成长为传奇大魔导师。</p>
        </div>
        <button id="saveButton" class="icon-button" type="button" aria-label="保存">
          <span aria-hidden="true">S</span>
        </button>
      </section>

      <section class="resource-panel">
        <div class="resource-readout">
          <span class="label">魔力</span>
          <strong id="dustCount">0</strong>
          <span id="dustRate">+0 / 秒</span>
          <span class="rank">当前身份：<strong id="rankTitle">魔法学徒</strong></span>
        </div>
        <button id="tapButton" class="tap-button" type="button">
          <span>练习魔法</span>
          <small id="tapPower">+1 魔力</small>
        </button>
      </section>

      <section class="shop" aria-label="升级">
        <article class="shop-item">
          <div>
            <h2>魔法学徒</h2>
            <p>协助你在课后持续凝聚魔力。</p>
          </div>
          <button id="collectorButton" type="button">
            <span id="collectorCost">招募 15</span>
            <small id="collectorOwned">0 名</small>
          </button>
        </article>

        <article class="shop-item">
          <div>
            <h2>高级魔杖</h2>
            <p>让每次魔法练习更加稳定强大。</p>
          </div>
          <button id="gloveButton" type="button">
            <span id="gloveCost">升级 50</span>
            <small id="gloveLevel">等级 0</small>
          </button>
        </article>
      </section>

      <section class="status">
        <div>
          <span>离线冥想收益</span>
          <strong id="offlineGain">0</strong>
        </div>
        <button id="resetButton" class="subtle" type="button">重置</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
